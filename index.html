<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Protocol Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sidebar">
        <div id="log-header">Network Stack Trace</div>
        <div id="log"></div>
    </div>

    <div id="main">
        <canvas id="networkCanvas"></canvas>
        <div class="controls">
            <input type="text" id="urlInput" value="example.com" placeholder="Enter domain...">
            <select id="modeSelect">
                <option value="packet">Packet Switched (TCP/IP)</option>
                <option value="circuit">Circuit Switched (Dedicated)</option>
            </select>
            <button id="startBtn">Initiate Request</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
