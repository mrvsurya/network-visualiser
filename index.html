<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Protocol Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sidebar">
        <div id="log-header">
            <span>Network Stack Trace</span>
            <button id="clearBtn" onclick="clearLog()">Clear</button>
        </div>
        <div id="log"></div>
    </div>

    <div id="main">
        <canvas id="networkCanvas"></canvas>
        <div class="controls">
            <input type="text" id="urlInput" value="example.com">
            <select id="modeSelect">
                <option value="packet">Packet Switched (TCP/IP)</option>
                <option value="circuit">Circuit Switched (Dedicated)</option>
            </select>
            <div class="slider-group">
                <label>Speed</label>
                <input type="range" id="speedSlider" min="1" max="15" value="6">
            </div>
            <button id="startBtn">Initiate Request</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
